apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: openshift-console-user-settings
  annotations:
    include.release.openshift.io/hypershift: "true"
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
    capability.openshift.io/name: Console
    kubernetes.io/description: >-
      Default deny all ingress and egress traffic in the
      openshift-console-user-settings namespace. This namespace stores
      per-user UI preference ConfigMaps but runs no pods. The policy
      improves network isolation by ensuring that if anything is ever
      deployed here, it has no network access by default.
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
