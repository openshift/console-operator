# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: en-US
inheritance: true

early_access: false

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  review_details: true
  path_filters:
  - "!vendor/**"
  - "!**/*_test.go"
  path_instructions:
    - path: "pkg/**/*.go"
      instructions: |
        Review Go code following OpenShift operator patterns.
        See CONVENTIONS.md for coding standards and patterns.
        Controllers should use the library-go factory pattern.
        Status conditions should use status.Handle* functions.
    - path: "bindata/assets/**/*.yaml"
      instructions: |
        Review YAML assets for Kubernetes resource correctness.
        Ensure proper annotations for cluster profiles.
    - path: "manifests/**/*.yaml"
      instructions: |
        Review CVO manifests carefully.
        These are deployed to clusters and changes have wide impact.
    - path: "quickstarts/**/*.yaml"
      instructions: |
        Review quickstart YAML definitions.
        Ensure cluster profile annotations are present.
        See quickstarts/README.md for guidelines.

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: local
  code_guidelines:
    enabled: true
    filePatterns:
      - "AGENTS.md"
      - "CLAUDE.md"
      - "ARCHITECTURE.md"
      - "CONVENTIONS.md"
      - "TESTING.md"
  linked_repositories:
    - repository: "openshift/console"
      instructions: >-
        Console is the downstream UI that consumes this operator's configuration.
        pkg/console/subresource/consoleserver/types.go is the canonical source
        for config structs - console copies these to pkg/serverconfig/types.go
        and they MUST remain in sync. Flag changes that affect: console startup
        config, feature gate toggles, ConsolePlugin CRD lifecycle, plugin
        enablement, or route/ingress configuration that console reads at runtime.
  issues:
    scope: auto
  jira:
    project_keys: []
  linear:
    team_keys: []
  pull_requests:
    scope: auto
